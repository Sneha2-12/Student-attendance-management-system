# Application Name
spring.application.name=student-attendance-system

# Server Port
server.port=8080

# H2 Database Configuration
spring.datasource.url=jdbc:h2:file:./data/attendancedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate & DDL Auto
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (available at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Thymeleaf Cache (set to false for active development)
spring.thymeleaf.cache=false

# Logging configuration
logging.level.org.springframework.security=INFO
logging.level.com.attendance.system=DEBUG

# Custom JWT settings
jwt.secret=mySuperSecureSecretKeyForStudentAttendanceSystemNeedToChangeThisLaterInProduction32BytesMinimumLengthSecretKey
jwt.expirationMs=86400000
