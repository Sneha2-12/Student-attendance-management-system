<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Attendance Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-wrapper" style="padding: 40px 20px;">
        <div class="auth-card" style="max-width: 540px;">
            <div class="auth-header">
                <div style="font-size: 36px; color: var(--primary); margin-bottom: 12px;">
                    <i class="fa-solid fa-user-plus"></i>
                </div>
                <h2>Create Account</h2>
                <p>Join the role-based attendance management system</p>
            </div>
            
            <div id="authAlert" class="alert" style="display: none;"></div>

            <form id="registerForm">
                <div class="role-selector">
                    <div class="role-option">
                        <input type="radio" id="roleStudent" name="role" value="ROLE_STUDENT" checked>
                        <label for="roleStudent" class="role-label">
                            <i class="fa-solid fa-user-graduate"></i>
                            <span>Student</span>
                        </label>
                    </div>
                    <div class="role-option">
                        <input type="radio" id="roleTeacher" name="role" value="ROLE_TEACHER">
                        <label for="roleTeacher" class="role-label">
                            <i class="fa-solid fa-chalkboard-user"></i>
                            <span>Teacher</span>
                        </label>
                    </div>
                    <div class="role-option">
                        <input type="radio" id="roleAdmin" name="role" value="ROLE_ADMIN">
                        <label for="roleAdmin" class="role-label">
                            <i class="fa-solid fa-user-shield"></i>
                            <span>Admin</span>
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="john@school.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>

                <!-- Student specific fields -->
                <div id="studentFields" class="form-row">
                    <div class="form-group">
                        <label for="rollNumber">Roll Number</label>
                        <input type="text" id="rollNumber" class="form-control" placeholder="CS202301">
                    </div>
                    <div class="form-group">
                        <label for="classSection">Class Section</label>
                        <input type="text" id="classSection" class="form-control" placeholder="CS-A">
                    </div>
                </div>

                <!-- Teacher specific fields -->
                <div id="teacherFields" class="form-row" style="display: none;">
                    <div class="form-group">
                        <label for="employeeId">Employee ID</label>
                        <input type="text" id="employeeId" class="form-control" placeholder="EMP101">
                    </div>
                    <div class="form-group">
                        <label for="department">Department</label>
                        <input type="text" id="department" class="form-control" placeholder="Computer Science">
                    </div>
                </div>
                
                <button type="submit" class="btn" style="margin-top: 15px;">
                    Register Account <i class="fa-solid fa-arrow-right-to-bracket" style="margin-left: 8px;"></i>
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Already have an account? <a href="/login">Sign in</a></p>
            </div>
        </div>
    </div>

    <script>
        const studentFields = document.getElementById('studentFields');
        const teacherFields = document.getElementById('teacherFields');
        const roleInputs = document.querySelectorAll('input[name="role"]');

        // Toggle dynamic fields based on role
        roleInputs.forEach(input => {
            input.addEventListener('change', function() {
                const selectedRole = this.value;
                if (selectedRole === 'ROLE_STUDENT') {
                    studentFields.style.display = 'grid';
                    teacherFields.style.display = 'none';
                    
                    document.getElementById('rollNumber').required = true;
                    document.getElementById('classSection').required = true;
                    document.getElementById('employeeId').required = false;
                    document.getElementById('department').required = false;
                } else if (selectedRole === 'ROLE_TEACHER') {
                    studentFields.style.display = 'none';
                    teacherFields.style.display = 'grid';
                    
                    document.getElementById('rollNumber').required = false;
                    document.getElementById('classSection').required = false;
                    document.getElementById('employeeId').required = true;
                    document.getElementById('department').required = true;
                } else {
                    studentFields.style.display = 'none';
                    teacherFields.style.display = 'none';
                    
                    document.getElementById('rollNumber').required = false;
                    document.getElementById('classSection').required = false;
                    document.getElementById('employeeId').required = false;
                    document.getElementById('department').required = false;
                }
            });
        });

        // Initialize validation
        document.getElementById('rollNumber').required = true;
        document.getElementById('classSection').required = true;

        // Form Submit
        document.getElementById('registerForm').addEventListener('submit', function(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value;
            const role = document.querySelector('input[name="role"]:checked').value;
            
            const rollNumber = document.getElementById('rollNumber').value;
            const classSection = document.getElementById('classSection').value;
            const employeeId = document.getElementById('employeeId').value;
            const department = document.getElementById('department').value;
            
            const alertEl = document.getElementById('authAlert');
            alertEl.className = 'alert';
            alertEl.style.display = 'none';

            const payload = {
                email, password, name, role,
                rollNumber: role === 'ROLE_STUDENT' ? rollNumber : null,
                classSection: role === 'ROLE_STUDENT' ? classSection : null,
                employeeId: role === 'ROLE_TEACHER' ? employeeId : null,
                department: role === 'ROLE_TEACHER' ? department : null
            };

            fetch('/api/auth/signup', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            })
            .then(async response => {
                const data = await response.json();
                if (response.ok) {
                    alertEl.innerText = "Registration successful! Redirecting to login...";
                    alertEl.classList.add('alert-success');
                    alertEl.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    // Extract meaningful error message
                    let errorMsg = data.message || "Registration failed.";
                    if (data.error === "Registration Failed" && errorMsg.includes("already in use")) {
                        errorMsg = "Employee ID is already in use. Please use a unique Employee ID.";
                    }
                    alertEl.innerText = errorMsg;
                    alertEl.classList.add('alert-danger');
                    alertEl.style.display = 'block';
                }
            })
            .catch(error => {
                console.error('Error during signup:', error);
                alertEl.innerText = "Connection error. Please try again.";
                alertEl.classList.add('alert-danger');
                alertEl.style.display = 'block';
            });
        });
    </script>
</body>
</html>
