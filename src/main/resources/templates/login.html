<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Attendance Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <div style="font-size: 36px; color: var(--primary); margin-bottom: 12px;">
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>
                <h2>Welcome Back</h2>
                <p>Sign in to your attendance and academics portal</p>
            </div>
            
            <div id="authAlert" class="alert alert-danger" style="display: none;"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="name@school.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn" style="margin-top: 10px;">
                    Sign In <i class="fa-solid fa-arrow-right-to-bracket" style="margin-left: 8px;"></i>
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Don't have an account? <a href="/register">Create one</a></p>
                <div style="margin-top: 20px; font-size: 11px; color: var(--text-muted); line-height: 1.5;">
                    <p><strong>Demo Credentials:</strong></p>
                    <p>Admin: admin@school.com | admin123</p>
                    <p>Teacher: teacher1@school.com | teacher123</p>
                    <p>Student: student1@school.com | student123</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertEl = document.getElementById('authAlert');
            
            alertEl.style.display = 'none';

            fetch('/api/auth/signin', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email, password })
            })
            .then(async response => {
                const data = await response.json();
                if (response.ok) {
                    // Sign-in sets cookie, so we can just redirect to dashboard
                    window.location.href = '/dashboard';
                } else {
                    alertEl.innerText = data.message || "Invalid email or password.";
                    alertEl.style.display = 'block';
                }
            })
            .catch(error => {
                console.error('Error logging in:', error);
                alertEl.innerText = "Connection error. Please try again.";
                alertEl.style.display = 'block';
            });
        });
    </script>
</body>
</html>
